name: Publish v1.4 Release Page

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/publish-release-v14.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create or update v1.4 release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Release keeps binaries outside the source history.
          if gh release view v1.4 >/dev/null 2>&1; then
            gh release edit v1.4 --title '方块矿境 v1.4 手机平衡版' --notes-file releases/v1.4/README.md --latest
            gh release upload v1.4 releases/v1.4/SHA256SUMS.txt releases/v1.4/VERIFICATION.md --clobber
          else
            gh release create v1.4 \
              --target main \
              --title '方块矿境 v1.4 手机平衡版' \
              --notes-file releases/v1.4/README.md \
              --latest \
              releases/v1.4/SHA256SUMS.txt \
              releases/v1.4/VERIFICATION.md
          fi
