name: Build FangKuangKuangJing v1.3

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Install Android SDK 35 tools
        shell: bash
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-35" "build-tools;35.0.0"

      - name: Prepare complete v1.3 project
        shell: bash
        run: |
          set -euo pipefail
          rm -rf work
          mkdir work
          unzip -q FangKuangKuangJing-Source.zip -d work
          PROJECT="$(find work -name settings.gradle -type f -printf '%h\n' | head -n1)"
          test -n "$PROJECT"
          echo "PROJECT=$PROJECT" >> "$GITHUB_ENV"

          base64 -d ci-v13/support.tar.gz.b64 | tar -xzf - -C "$PROJECT"
          JAVA_DIR="$PROJECT/app/src/main/java/com/ame/blocktetris"
          mkdir -p "$JAVA_DIR"
          base64 -d ci-v13/BlockTetrisView.part00.gz.b64 | gzip -dc > "$JAVA_DIR/BlockTetrisView.java"
          cat ci-v13/BlockTetrisView.part01 ci-v13/BlockTetrisView.part02 >> "$JAVA_DIR/BlockTetrisView.java"
          base64 -d ci-v13/BlockTetrisView.rest.gz.b64 | gzip -dc >> "$JAVA_DIR/BlockTetrisView.java"
          echo '487f08f09ab25642589ddbc222b4676fa15b53d38ac03ae0e0ebd1ff6d419be6  '"$JAVA_DIR/BlockTetrisView.java" | sha256sum -c -

          python3 - "$PROJECT" <<'PY'
          import os, sys, wave, struct
          root = sys.argv[1]
          raw = os.path.join(root, 'app/src/main/res/raw')
          music = os.path.join(root, 'app/src/main/assets/music')
          os.makedirs(raw, exist_ok=True)
          os.makedirs(music, exist_ok=True)
          sfx = ['move','rotate','soft_drop','hard_drop','lock','line','multi_line','four_line','skill','ready','egg','pause','game_over','click','hold']
          tracks = ['bgm_ruins_echo','bgm_crystal_pulse','bgm_lava_depth','bgm_sky_relic']
          def make_wav(path, seconds):
              rate = 22050
              frames = max(1, int(rate * seconds))
              with wave.open(path, 'wb') as w:
                  w.setnchannels(1); w.setsampwidth(2); w.setframerate(rate)
                  w.writeframes(struct.pack('<h', 0) * frames)
          for name in sfx:
              if not any(os.path.exists(os.path.join(raw, 'sfx_' + name + ext)) for ext in ('.wav','.ogg','.mp3')):
                  make_wav(os.path.join(raw, 'sfx_' + name + '.wav'), 0.08)
          for name in tracks:
              path = os.path.join(music, name + '.wav')
              if not os.path.exists(path): make_wav(path, 0.25)
          PY

          grep -q "versionCode 6" "$PROJECT/app/build.gradle"
          grep -q "versionName '1.3'" "$PROJECT/app/build.gradle"

      - name: Build release APK
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT"
          gradle --no-daemon --stacktrace :app:assembleRelease

      - name: Align and collect APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifact
          APK="$(find "$PROJECT/app/build/outputs/apk/release" -name '*.apk' -type f | head -n1)"
          test -f "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/zipalign" -p -f 4 "$APK" artifact/FangKuangKuangJing-v1.3-vc6-aligned-unsigned.apk
          "$ANDROID_HOME/build-tools/35.0.0/zipalign" -c -v 4 artifact/FangKuangKuangJing-v1.3-vc6-aligned-unsigned.apk
          "$ANDROID_HOME/build-tools/35.0.0/aapt2" dump badging artifact/FangKuangKuangJing-v1.3-vc6-aligned-unsigned.apk > artifact/APK-METADATA.txt
          cp "$ANDROID_HOME/build-tools/35.0.0/lib/apksigner.jar" artifact/
          sha256sum artifact/* > artifact/SHA256SUMS.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FangKuangKuangJing-v1.3-aligned-unsigned
          path: artifact/
          if-no-files-found: error
          retention-days: 3
