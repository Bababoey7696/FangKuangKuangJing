name: Android CI

on:
  push:
    branches: [ main, develop, release-v1.4-source ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/crisp-audio-v1.4.2
          fetch-depth: 0

      - name: Apply verified v1.4.2 source patch
        shell: bash
        run: |
          set -euo pipefail
          if [ -d .build/v142.text ]; then
            cat .build/v142.text/part_00.patch .build/v142.text/part_01.patch .build/v142.text/part_02.patch > /tmp/v142-full.patch
            awk '/^diff -ruN .*app\/build.gradle/{copy=1} copy{print}' /tmp/v142-full.patch > /tmp/v142-code.patch
            patch --dry-run -p1 < /tmp/v142-code.patch
            patch -p1 < /tmp/v142-code.patch
            python3 - <<'PY'
          from pathlib import Path
          import re
          path = Path('README.md')
          text = path.read_text(encoding='utf-8')
          text = re.sub(r'^# 方块矿境 Block Mine v.*$', '# 方块矿境 Block Mine v1.4.2', text, count=1, flags=re.M)
          text = re.sub(r'^- versionName：.*$', '- versionName：`1.4.2`', text, count=1, flags=re.M)
          text = re.sub(r'^- versionCode：.*$', '- versionCode：`9`', text, count=1, flags=re.M)
          note = 'v1.4.2 新增可切换的 v1.2 经典触控与 v1.4.1 稳健触控；保留原有四首背景音乐，在播放端削弱高频底噪，并修复快速落地与锁定音叠加。'
          if note not in text:
              text = text.rstrip() + '\n\n' + note + '\n'
          path.write_text(text, encoding='utf-8')
          PY
          fi
          grep -q 'versionCode 9' app/build.gradle
          grep -q "versionName '1.4.2'" app/build.gradle
          grep -q '经典 v1.2' app/src/main/java/com/ame/blocktetris/BlockTetrisView.java
          grep -q '稳健 v1.4.1' app/src/main/java/com/ame/blocktetris/BlockTetrisView.java
          grep -q 'Equalizer' app/src/main/java/com/ame/blocktetris/AudioEngine.java
          grep -q 'lastHardDropSound' app/src/main/java/com/ame/blocktetris/AudioEngine.java
          test ! -f app/src/main/java/com/ame/blocktetris/StableTouchBlockTetrisView.java

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Reject signing secrets and machine paths
        shell: bash
        run: |
          set -euo pipefail
          if find . -type f \( -name '*.jks' -o -name '*.keystore' -o -name 'keystore.properties' -o -name 'local.properties' \) | grep -q .; then
            echo 'Signing secret or machine-specific file detected.'
            exit 1
          fi

      - name: Verify Gradle Wrapper
        shell: bash
        run: |
          set -euo pipefail
          test -f gradlew
          test -f gradlew.bat
          test -f gradle/wrapper/gradle-wrapper.jar
          test -f gradle/wrapper/gradle-wrapper.properties
          grep -q 'gradle-8.7-bin.zip' gradle/wrapper/gradle-wrapper.properties
          unzip -t gradle/wrapper/gradle-wrapper.jar >/dev/null

      - name: Build debug and unsigned release APK
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon clean assembleDebug assembleRelease

      - name: Upload unsigned build outputs
        uses: actions/upload-artifact@v4
        with:
          name: block-mine-v1.4.2-unsigned-apks
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 7

      - name: Materialize clean source on feature branch
        if: success() && hashFiles('.build/v142.text/part_00.patch') != ''
        shell: bash
        run: |
          set -euo pipefail
          git checkout origin/main -- .github/workflows/android-ci.yml
          rm -rf .build
          rm -f .github/workflows/apply-v142-overlay.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add dual touch profiles and clean audio playback'
          git push origin HEAD:fix/crisp-audio-v1.4.2
