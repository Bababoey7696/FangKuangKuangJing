name: Android CI

on:
  push:
    branches: [ main, develop, release-v1.4-source ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write

jobs:
  patch-horizontal-repeat:
    if: github.event_name == 'pull_request' && github.head_ref == 'fix/horizontal-repeat-guard'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Separate horizontal tap and hold timing
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('app/src/main/java/com/ame/blocktetris/BlockTetrisView.java')
          text = path.read_text(encoding='utf-8')
          old = '''    private void beginRepeat(int control){
        activeControl=control;
        long now=SystemClock.uptimeMillis();
        repeatAt=now+repeatDelay();
    }

    private long repeatDelay(){
        return sensitivity==SENS_LOW?235L:(sensitivity==SENS_HIGH?125L:175L);
    }

    private long repeatInterval(){
        return sensitivity==SENS_LOW?112L:(sensitivity==SENS_HIGH?54L:80L);
    }

    private void updateHeldControl(long now){
        if(activeControl==CONTROL_NONE||activeControl==CONTROL_DROP||!canOperate())return;
        if(now<repeatAt)return;
        if(activeControl==CONTROL_LEFT)move(-1,true);
        else if(activeControl==CONTROL_RIGHT)move(1,true);
        else if(activeControl==CONTROL_DOWN)stepDown(true);
        repeatAt=now+repeatInterval();
    }
'''
          new = '''    private void beginRepeat(int control){
        activeControl=control;
        long now=SystemClock.uptimeMillis();
        repeatAt=now+repeatDelay(control);
    }

    /**
     * A tap moves exactly one cell. Horizontal auto-repeat starts only after a
     * deliberate hold, while soft-drop keeps its faster original response.
     */
    private long repeatDelay(int control){
        if(control==CONTROL_DOWN){
            return sensitivity==SENS_LOW?235L:(sensitivity==SENS_HIGH?125L:175L);
        }
        return sensitivity==SENS_LOW?380L:(sensitivity==SENS_HIGH?260L:320L);
    }

    private long repeatInterval(int control){
        if(control==CONTROL_DOWN){
            return sensitivity==SENS_LOW?112L:(sensitivity==SENS_HIGH?54L:80L);
        }
        return sensitivity==SENS_LOW?120L:(sensitivity==SENS_HIGH?72L:94L);
    }

    private void updateHeldControl(long now){
        if(activeControl==CONTROL_NONE||activeControl==CONTROL_DROP||!canOperate())return;
        if(now<repeatAt)return;
        if(activeControl==CONTROL_LEFT)move(-1,true);
        else if(activeControl==CONTROL_RIGHT)move(1,true);
        else if(activeControl==CONTROL_DOWN)stepDown(true);
        repeatAt=now+repeatInterval(activeControl);
    }
'''
          if old in text:
              path.write_text(text.replace(old, new, 1), encoding='utf-8')
          elif 'repeatAt=now+repeatDelay(control);' not in text:
              raise SystemExit('Expected repeat-control block was not found.')
          PY

      - name: Commit patched source
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'Source already patched.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/src/main/java/com/ame/blocktetris/BlockTetrisView.java
          git commit -m 'Fix accidental double horizontal movement on short taps'
          git push origin HEAD:${{ github.head_ref }}

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Reject signing secrets and machine paths
        shell: bash
        run: |
          set -euo pipefail
          if find . -type f \( -name '*.jks' -o -name '*.keystore' -o -name 'keystore.properties' -o -name 'local.properties' \) | grep -q .; then
            echo 'Signing secret or machine-specific file detected.'
            exit 1
          fi

      - name: Verify Gradle Wrapper
        shell: bash
        run: |
          set -euo pipefail
          test -f gradlew
          test -f gradlew.bat
          test -f gradle/wrapper/gradle-wrapper.jar
          test -f gradle/wrapper/gradle-wrapper.properties
          grep -q 'gradle-8.7-bin.zip' gradle/wrapper/gradle-wrapper.properties
          unzip -t gradle/wrapper/gradle-wrapper.jar >/dev/null

      - name: Build debug and unsigned release APK
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon clean assembleDebug assembleRelease

      - name: Upload unsigned build outputs
        uses: actions/upload-artifact@v4
        with:
          name: block-mine-unsigned-apks
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 7
