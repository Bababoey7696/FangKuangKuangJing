name: Apply v1.4.2 audio and touch maintenance

on:
  issue_comment:
    types: [ created ]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.issue.pull_request && github.event.issue.number == 6 && github.event.comment.body == '/apply-v142'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout v1.4.2 feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/crisp-audio-v1.4.2
          fetch-depth: 0

      - name: Apply verified overlay
        shell: bash
        run: |
          set -euo pipefail
          PAYLOAD=.build/v142_overlay.tar.gz
          if [ ! -f "$PAYLOAD" ]; then
            echo 'Overlay already applied.'
            exit 0
          fi
          echo 'b30dfacecd9fbf45a601fcd29826faaeaa86fad6d673b10da7161d06d64387ba  .build/v142_overlay.tar.gz' | sha256sum -c -
          tar -xzf "$PAYLOAD" -C .
          rm -f app/src/main/java/com/ame/blocktetris/StableTouchBlockTetrisView.java
          rm -f "$PAYLOAD"

          python3 - <<'PY'
          from pathlib import Path
          build = Path('app/build.gradle').read_text(encoding='utf-8')
          view = Path('app/src/main/java/com/ame/blocktetris/BlockTetrisView.java').read_text(encoding='utf-8')
          audio = Path('app/src/main/java/com/ame/blocktetris/AudioEngine.java').read_text(encoding='utf-8')
          main = Path('app/src/main/java/com/ame/blocktetris/MainActivity.java').read_text(encoding='utf-8')
          assert 'versionCode 9' in build and "versionName '1.4.2'" in build
          assert '经典 v1.2' in view and '稳健 v1.4.1' in view
          assert 'repeatDelay(int control)' in view and 'repeatInterval(int control)' in view
          assert 'music/bgm_classic_v12.ogg' in audio
          assert 'lastHardDropSound' in audio
          assert 'new BlockTetrisView(this)' in main
          assert Path('app/src/main/assets/music/bgm_classic_v12.ogg').stat().st_size > 50000
          assert Path('app/src/main/res/raw/sfx_hard_drop.wav').stat().st_size > 3000
          PY

      - name: Commit feature update
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet && git diff --cached --quiet; then
            echo 'No changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add selectable v1.2 touch and restore classic audio'
          git push origin HEAD:fix/crisp-audio-v1.4.2
