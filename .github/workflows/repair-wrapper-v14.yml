name: Repair v1.4 Gradle Wrapper

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair-wrapper:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout clean source branch
        uses: actions/checkout@v4
        with:
          ref: release-v1.4-source
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Generate official Gradle Wrapper
        run: gradle wrapper --gradle-version 8.7 --distribution-type bin

      - name: Verify Wrapper files
        shell: bash
        run: |
          set -euo pipefail
          test -x gradlew
          test -f gradlew.bat
          test -f gradle/wrapper/gradle-wrapper.jar
          test -f gradle/wrapper/gradle-wrapper.properties
          grep -q 'gradle-8.7-bin.zip' gradle/wrapper/gradle-wrapper.properties
          unzip -t gradle/wrapper/gradle-wrapper.jar >/dev/null

      - name: Commit Wrapper to source branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gradlew gradlew.bat gradle/wrapper/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.properties
          if git diff --cached --quiet; then
            echo 'Wrapper already complete.'
          else
            git commit -m "Restore Gradle 8.7 Wrapper"
            git push origin HEAD:release-v1.4-source
          fi
