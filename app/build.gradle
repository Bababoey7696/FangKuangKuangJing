plugins {
    id 'com.android.application'
}

android {
    namespace 'com.ame.blocktetris'
    compileSdk 35

    defaultConfig {
        applicationId 'com.ame.blocktetris'
        minSdk 21
        targetSdk 35
        versionCode 8
        versionName '1.4.1'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
